<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweden Lens Buddy - Skyddsobjekt Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .radar-ring { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(1.5); opacity: 0; } }
        .transition-all-500 { transition: all 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans select-none overflow-hidden">

<div id="app-bg" class="bg-blue-50 flex flex-col items-center justify-between min-h-screen p-6 transition-all-500">
    
    <!-- 头部：语言切换 & 标题 -->
    <div class="w-full flex justify-between items-center z-20">
        <div>
            <h1 class="text-xl font-bold tracking-tight text-gray-800">Lens Buddy 🇸🇪</h1>
            <!-- 🌟 改进：变为可点击的按钮 -->
            <button onclick="openModal()" class="text-xs text-blue-600 font-medium mt-1 bg-white/70 px-2 py-1 rounded-full shadow-sm hover:bg-white transition flex items-center gap-1 active:scale-95">
                <span id="stats-counter-text">🛡️ Loading...</span> 
                <svg class="w-3 h-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
        <button onclick="switchLang()" class="bg-white/80 backdrop-blur shadow-sm px-4 py-2 rounded-full font-bold text-sm hover:bg-gray-100 transition">
            🌐 <span id="lang-btn">EN</span>
        </button>
    </div>

    <!-- 核心雷达区 -->
    <div class="relative flex items-center justify-center w-full flex-1 my-8">
        <div id="radar-ring" class="absolute w-72 h-72 bg-blue-300 rounded-full radar-ring"></div>
        <div id="status-ball" class="w-48 h-48 bg-blue-500 rounded-full flex flex-col items-center justify-center text-white shadow-xl z-10 transition-all-500">
            <span id="status-icon" class="text-6xl mb-2">📸</span>
            <span id="status-text" class="text-2xl font-bold tracking-wider">SAFE</span>
        </div>
        
        <div id="zone-tag" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white text-xs px-3 py-1 rounded-full shadow-lg opacity-0 transition-opacity duration-300 z-20 pointer-events-none whitespace-nowrap">
            📍 <span id="zone-name">Unknown Zone</span>
        </div>
    </div>

    <!-- 底部提示信息区 -->
    <div class="bg-white/80 backdrop-blur w-full p-5 rounded-2xl shadow-lg z-20">
        <p id="tip-text" class="text-gray-600 text-sm leading-relaxed text-center">
            Getting GPS signal...
        </p>
        <p id="geo-debug" class="text-[10px] text-gray-400 text-center mt-3 font-mono">
            LAT: -- | LNG: -- | Acc: --
        </p>
    </div>
</div>

<!-- 🌟 覆盖范围弹窗 (Modal) -->

    const GOTHENBURG_ZONES = []; 
    const UPPSALA_ZONES = [];

    const DANGER_ZONES = [...STOCKHOLM_ZONES, ...GOTHENBURG_ZONES, ...UPPSALA_ZONES];

    // ==========================================
    // 3. UI 静态文字全量更新逻辑
    // ==========================================
    function updateStaticText() {
        const d = LANG_DATA[currentLang];
        
        // 更新顶部 coverage 按钮文本
        document.getElementById('stats-counter-text').innerText = `🛡️ ${d.coverage} Stockholm (${DANGER_ZONES.length}${d.zones})`;
        
        // 更新弹窗文本
        document.getElementById('modal-title').innerText = d.modalTitle;
        document.getElementById('modal-desc').innerText = d.modalDesc;
        document.getElementById('modal-sth-count').innerText = `${DANGER_ZONES.length}${d.zones}`;
        
        // 更新所有“Coming soon”标签
        document.querySelectorAll('.modal-soon').forEach(el => {
            el.innerText = d.comingSoon;
        });

        // 如果还没有 GPS 信号，确保提示文字也跟着切换语言
        if (!lastPosition) {
            document.getElementById('tip-text').innerText = d.gpsLoading;
        } else {
            // 如果已经有 GPS，强行刷新一次雷达 UI 来翻译动态文本
            updateUI(lastPosition); 
        }
    }

    // ==========================================
    // 4. 核心算法 (测距 & 射线碰撞)
    // ==========================================
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function isPointInPolygon(point, polygon) {
        if (!polygon || polygon.length < 3) return false;
        let x = point.lng, y = point.lat;
        let inside = false;
        for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
            let xi = polygon[i][1], yi = polygon[i][0]; 
            let xj = polygon[j][1], yj = polygon[j][0];
            let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    // ==========================================
    // 5. 动态 UI 更新逻辑
    // ==========================================
    let lastPosition = null;

    function updateUI(pos) {
        lastPosition = pos;
        const { latitude, longitude, accuracy } = pos.coords;
        const userPoint = { lat: latitude, lng: longitude };
        const d = LANG_DATA[currentLang];
        
        // 🌟 改进：底部的 Debug 信息也做了全面翻译
        document.getElementById('geo-debug').innerText = `${d.lat}: ${latitude.toFixed(5)} | ${d.lng}: ${longitude.toFixed(5)} | ${d.acc}: ${Math.round(accuracy)}m`;

        let activeDangerZone = null;  
        let activeWarningZone = null; 
        let closestDist = Infinity;   
        let closestZone = null;       

        DANGER_ZONES.forEach(zone => {
            const dist = getDistance(latitude, longitude, zone.lat, zone.lng);
            if (dist < closestDist) { 
                closestDist = dist; 
                closestZone = zone; 
            }
            if (zone.polygon && isPointInPolygon(userPoint, zone.polygon)) {
                if (zone.type === 'red') activeDangerZone = zone;
                else activeWarningZone = zone;
            }
        });

        const bg = document.getElementById('app-bg');
        const ball = document.getElementById('status-ball');
        const ring = document.getElementById('radar-ring');
        const icon = document.getElementById('status-icon');
        const text = document.getElementById('status-text');
        const tip = document.getElementById('tip-text');
        const tag = document.getElementById('zone-tag');
        const zoneNameSpan = document.getElementById('zone-name');

        if (activeDangerZone) {
            bg.className = "bg-red-50 flex flex-col items-center justify-between min-h-screen p-6 transition-all-500";
            ball.className = "w-48 h-48 bg-red-600 rounded-full flex flex-col items-center justify-center text-white shadow-2xl z-10 scale-105 transition-all-500";
            ring.className = "absolute w-72 h-72 bg-red-400 rounded-full radar-ring";
            icon.innerText = "🚫"; text.innerText = d.danger; 
            // 🌟 改进：使用字典中的红区前缀
            tip.innerHTML = `<span class="font-bold text-red-600 block mb-1">${d.redAlert}</span>${activeDangerZone.reason[currentLang]}`;
            tag.style.opacity = "1"; zoneNameSpan.innerText = activeDangerZone.name[currentLang];
            if(navigator.vibrate) navigator.vibrate([400, 100, 400]);

        } else if (activeWarningZone || closestDist < 600) {
            let target = activeWarningZone || closestZone;
            bg.className = "bg-amber-50 flex flex-col items-center justify-between min-h-screen p-6 transition-all-500";
            ball.className = "w-48 h-48 bg-amber-500 rounded-full flex flex-col items-center justify-center text-white shadow-xl z-10 transition-all-500";
            ring.className = "absolute w-72 h-72 bg-amber-300 rounded-full radar-ring";
            icon.innerText = "⚠️"; text.innerText = d.warn; 
            
            // 🌟 改进：使用字典中的灰区和预警前缀
            let prefix = activeWarningZone ? d.greyZone : d.approachWarn;
            tip.innerHTML = `<span class="font-bold text-amber-600 block mb-1">${prefix}</span>${target.reason[currentLang]}`;
            tag.style.opacity = "1"; zoneNameSpan.innerText = target.name[currentLang];

        } else {
            bg.className = "bg-blue-50 flex flex-col items-center justify-between min-h-screen p-6 transition-all-500";
            ball.className = "w-48 h-48 bg-blue-500 rounded-full flex flex-col items-center justify-center text-white shadow-xl z-10 transition-all-500";
            ring.className = "absolute w-72 h-72 bg-blue-300 rounded-full radar-ring";
            icon.innerText = "📸"; text.innerText = d.safe; tip.innerText = d.safeTip;
            tag.style.opacity = "0";
        }
    }

    // ==========================================
    // 6. 交互功能：语言切换 & 弹窗逻辑
    // ==========================================
    function switchLang() {
        if(currentLang === 'zh') currentLang = 'en';
        else if(currentLang === 'en') currentLang = 'sv';
        else currentLang = 'zh';
        
        document.getElementById('lang-btn').innerText = LANG_DATA[currentLang].btn;
        updateStaticText(); // 切换语言时，同步刷新所有静态文字
    }

    // 弹窗控制逻辑 (带一点过渡动画)
    function openModal() {
        const modal = document.getElementById('coverage-modal');
        const content = document.getElementById('modal-content');
        modal.classList.remove('hidden');
        // 延迟一帧执行透明度和缩放变换，以触发 CSS 动画
        requestAnimationFrame(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
        });
    }

    function closeModal() {
        const modal = document.getElementById('coverage-modal');
        const content = document.getElementById('modal-content');
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        // 等待动画结束再隐藏
        setTimeout(() => { modal.classList.add('hidden'); }, 300);
    }

    // ==========================================
    // 7. 初始化程序
    // ==========================================
    function init() {
        updateStaticText(); // 页面刚加载时，先用默认语言渲染一遍静态文字
        
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(updateUI, 
                (err) => { 
                    document.getElementById('tip-text').innerText = LANG_DATA[currentLang].gpsError;
                }, 
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
            );
        } else {
            document.getElementById('tip-text').innerText = LANG_DATA[currentLang].gpsNoSupport;
        }
    }

    init();
</script>
