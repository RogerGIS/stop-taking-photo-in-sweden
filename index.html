<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Sweden Lens Buddy - Skyddsobjekt Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .radar-ring { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(1.5); opacity: 0; } }
        .transition-all-500 { transition: all 0.5s ease-in-out; }
        body { 
            touch-action: none; 
            overscroll-behavior: none; 
            /* Fix for mobile address bar heights */
            height: 100vh;
            height: 100dvh;
        }
        .safe-pb {
            padding-bottom: env(safe-area-inset-bottom, 24px);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans select-none overflow-hidden">

<div id="app-bg" class="bg-blue-50 flex flex-col items-center justify-between min-h-screen h-[100dvh] p-6 safe-pb transition-all-500">
    
    <div class="w-full flex justify-between items-center z-20">
        <div>
            <h1 class="text-xl font-bold tracking-tight text-gray-800">Lens Buddy 🇸🇪</h1>
            <button onclick="openModal()" class="text-xs text-blue-600 font-medium mt-1 bg-white/70 px-2 py-1 rounded-full shadow-sm hover:bg-white transition flex items-center gap-1 active:scale-95">
                <span id="stats-counter-text">🛡️ Loading...</span> 
                <svg class="w-3 h-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
        <button onclick="switchLang()" class="bg-white/80 backdrop-blur shadow-sm px-4 py-2 rounded-full font-bold text-sm hover:bg-gray-100 transition flex items-center gap-2">
            🌐 <span id="lang-btn">中文</span>
        </button>
    </div>

    <div class="relative flex items-center justify-center w-full flex-1 my-8">
        <div id="radar-ring" class="absolute w-72 h-72 bg-blue-300 rounded-full radar-ring"></div>
        <div id="status-ball" class="w-40 h-40 bg-blue-500 rounded-full flex flex-col items-center justify-center text-white shadow-xl z-10 transition-all-500">
            <span id="status-icon" class="text-5xl mb-2">📸</span>
            <span id="status-text" class="text-xl font-bold tracking-wider uppercase">SAFE</span>

        <div id="zone-tag" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white text-xs px-3 py-1 rounded-full shadow-lg opacity-0 transition-opacity duration-300 z-20 pointer-events-none whitespace-nowrap">

    <div class="bg-white/90 backdrop-blur w-full p-4 rounded-2xl shadow-lg z-20 mb-2">

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function isPointInPolygon(point, polygon) {
        let x = point.lng, y = point.lat, inside = false;
        for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
            let xi = polygon[i][1], yi = polygon[i][0], xj = polygon[j][1], yj = polygon[j][0];
            if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
        }
        return inside;
    }

    let lastPos = null;

    function updateUI(pos) {
        lastPos = pos;
        const { latitude, longitude, accuracy } = pos.coords;
        const d = LANG_DATA[currentLang];
        document.getElementById('geo-debug').innerText = `${d.lat}: ${latitude.toFixed(5)} | ${d.lng}: ${longitude.toFixed(5)} | ${d.acc}: ${Math.round(accuracy)}m`;

        let activeRed = null, activeYellow = null, closestDist = Infinity, closestZone = null;
        DANGER_ZONES.forEach(z => {
            const dist = getDistance(latitude, longitude, z.lat, z.lng);
            if (dist < closestDist) { closestDist = dist; closestZone = z; }
            if (isPointInPolygon({lat: latitude, lng: longitude}, z.polygon)) {
                if (z.type === 'red') activeRed = z; else activeYellow = z;
            }
        });

        const bg = document.getElementById('app-bg'), ball = document.getElementById('status-ball'), ring = document.getElementById('radar-ring'),
              icon = document.getElementById('status-icon'), text = document.getElementById('status-text'), tip = document.getElementById('tip-text'),
              tag = document.getElementById('zone-tag'), zoneName = document.getElementById('zone-name');

        if (activeRed) {
            bg.className = "bg-red-50 flex flex-col items-center justify-between min-h-screen h-[100dvh] p-6 safe-pb transition-all-500";
            ball.className = "w-40 h-40 bg-red-600 rounded-full flex flex-col items-center justify-center text-white shadow-2xl z-10 scale-105 transition-all-500";
            ring.className = "absolute w-72 h-72 bg-red-400 rounded-full radar-ring";
            icon.innerText = "🚫"; text.innerText = d.danger; 
            tip.innerHTML = `<div class="font-bold text-red-600 mb-1">${d.redAlert}</div><div class="text-gray-700">${activeRed.reason[currentLang]}</div>`;
            tag.style.opacity = "1"; zoneName.innerText = activeRed.name[currentLang];
            if(navigator.vibrate) navigator.vibrate([400, 100, 400]);
        } else if (activeYellow || closestDist < 500) {
            let target = activeYellow || closestZone;
            bg.className = "bg-amber-50 flex flex-col items-center justify-between min-h-screen h-[100dvh] p-6 safe-pb transition-all-500";
            ball.className = "w-40 h-40 bg-amber-500 rounded-full flex flex-col items-center justify-center text-white shadow-xl z-10 transition-all-500";
            ring.className = "absolute w-72 h-72 bg-amber-300 rounded-full radar-ring";
            icon.innerText = "⚠️"; text.innerText = d.warn; 
            tip.innerHTML = `<div class="font-bold text-amber-600 mb-1">${activeYellow ? d.greyZone : d.approachWarn}</div><div class="text-gray-700">${target.reason[currentLang]}</div>`;
            tag.style.opacity = "1"; zoneName.innerText = target.name[currentLang];
        } else {
            bg.className = "bg-blue-50 flex flex-col items-center justify-between min-h-screen h-[100dvh] p-6 safe-pb transition-all-500";
            ball.className = "w-40 h-40 bg-blue-500 rounded-full flex flex-col items-center justify-center text-white shadow-xl z-10 transition-all-500";
            ring.className = "absolute w-72 h-72 bg-blue-300 rounded-full radar-ring";
            icon.innerText = "📸"; text.innerText = d.safe; 
            tip.innerHTML = `<div class="text-gray-700 px-4">${d.safeTip}</div>`;
            tag.style.opacity = "0";
        }
    }

    function updateStaticText() {
        const d = LANG_DATA[currentLang];
        const activeCities = [...new Set(DANGER_ZONES.map(z => z.city))];
        document.getElementById('stats-counter-text').innerText = `${d.coverage}${activeCities.join(', ')}`;
        document.getElementById('modal-title').innerText = d.modalTitle;
        
        const listHtml = CITY_STATUS.map(city => {
            const zonesInCity = DANGER_ZONES.filter(z => z.city === city.id);
            if (zonesInCity.length > 0) {
                return `<li class="flex items-center justify-between p-2 bg-green-50 rounded-lg border border-green-100">
                    <span class="font-bold text-green-800 flex items-center gap-2">✅ ${city.name}</span>
                    <span class="text-xs text-green-700">${zonesInCity.length} ${d.locations}</span>
                </li>`;
            } else {
                return `<li class="flex items-center justify-between p-2 opacity-60">
                    <span class="font-medium text-gray-600 flex items-center gap-2">⏳ ${city.name}</span>
                    <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded-full uppercase font-bold tracking-wider">${d.comingSoon}</span>
                </li>`;
            }
        }).join('');
        document.querySelector('#coverage-modal ul').innerHTML = listHtml;

        document.getElementById('modal-content-details').innerHTML = `
            <p class="mb-3">${d.modalDesc}</p>
            <div class="border-t border-gray-200 mt-4 pt-4 text-[10px] text-gray-400 space-y-2">
                <p>• ${d.modalSource}</p>
                <p class="italic text-gray-500">• ${d.modalDisclaimer}</p>
            </div>
        `;
        if(!lastPos) document.getElementById('tip-text').innerText = d.gpsLoading;
    }

    function switchLang() {
        if(currentLang === 'zh') currentLang = 'en'; else if(currentLang === 'en') currentLang = 'sv'; else currentLang = 'zh';
        document.getElementById('lang-btn').innerText = LANG_DATA[currentLang].btn;
        updateStaticText();
        if(lastPos) updateUI(lastPos);
    }

    function openModal() {
        const m = document.getElementById('coverage-modal'), c = document.getElementById('modal-content');
        m.classList.remove('hidden');
        requestAnimationFrame(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); });
    }

    function closeModal() {
        const m = document.getElementById('coverage-modal'), c = document.getElementById('modal-content');
        m.classList.add('opacity-0'); c.classList.add('scale-95');
        setTimeout(() => m.classList.add('hidden'), 300);
    }

    updateStaticText();
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(updateUI, (err) => { 
            document.getElementById('tip-text').innerText = LANG_DATA[currentLang].gpsError;
        }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 });
    } else {
        document.getElementById('tip-text').innerText = LANG_DATA[currentLang].gpsNoSupport;
    }
</script>
</body>
</html>
